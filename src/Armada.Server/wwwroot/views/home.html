            <div class="view-header">
                <div>
                    <h2>System Status</h2>
                    <p class="text-dim view-subtitle">Overview of fleet health, active missions, and recent activity.</p>
                </div>
                <div class="view-actions">
                    <button class="btn btn-primary btn-sm" @click="showDispatchForm = true; dispatchMode = 'quick'; navigate('missions'); loadMissions()" title="Smart dispatch with NLP task parsing">+ Dispatch</button>
                    <button class="btn btn-primary btn-sm" @click="openCreateVoyage()" title="Create a new voyage with multiple missions (advanced)">+ Voyage</button>
                    <button class="btn btn-sm refresh-btn" @click="dashboardRefresh($event)" title="Refresh all dashboard data">&#x21bb;</button>
                </div>
            </div>
            <div class="cards">
                <div class="card clickable" @click="navigate('captains')" title="Click to view all captains">
                    <div class="card-label">Captains</div>
                    <div class="card-value" x-text="status.totalCaptains || 0"></div>
                    <div class="card-detail">
                        <span class="tag idle" x-text="(status.idleCaptains || 0) + ' idle'" title="Idle -- available to accept new missions"></span>
                        <span class="tag working" x-text="(status.workingCaptains || 0) + ' working'" title="Working -- actively executing a mission"></span>
                        <span class="tag stalled" x-show="status.stalledCaptains > 0" x-text="(status.stalledCaptains || 0) + ' stalled'" title="Stalled -- captain process is unresponsive"></span>
                    </div>
                </div>
                <div class="card clickable" @click="navigate('voyages')" title="Click to view all voyages">
                    <div class="card-label">Active Voyages</div>
                    <div class="card-value" x-text="status.activeVoyages || 0"></div>
                </div>
                <div class="card clickable" @click="navigate('missions'); loadMissions()" title="Click to view all missions">
                    <div class="card-label">Missions</div>
                    <div class="card-value" x-text="totalMissions()"></div>
                    <div class="card-detail">
                        <template x-for="[key, val] in Object.entries(status.missionsByStatus || {})" :key="key">
                            <span class="tag" :class="key.toLowerCase()" x-text="val + ' ' + key"></span>
                        </template>
                    </div>
                </div>
            </div>

            <template x-if="status.voyages && status.voyages.length > 0">
                <div>
                    <h3>Voyage Progress</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th title="Voyage name and unique identifier">Voyage</th><th title="Current voyage lifecycle state">Status</th><th title="Percentage of missions completed">Progress</th><th title="Completed vs total missions in this voyage">Missions</th><th></th></tr></thead>
                            <tbody>
                                <template x-for="vp in status.voyages" :key="vp.voyage?.id">
                                    <tr class="clickable" @click="navigate('voyages', 'voyage-detail', vp.voyage?.id)">
                                        <td>
                                            <strong x-text="vp.voyage?.title || vp.voyage?.id"></strong>
                                            <div class="text-dim id-display"><span class="mono" x-text="vp.voyage?.id"></span><button class="copy-btn" @click.stop="copyId(vp.voyage?.id, $event)" title="Copy ID"></button></div>
                                        </td>
                                        <td><span class="tag" :class="(vp.voyage?.status || '').toLowerCase()" x-text="vp.voyage?.status" :title="statusTooltip(vp.voyage?.status)"></span></td>
                                        <td>
                                            <div class="progress-bar"><div class="progress-fill" :style="'width:' + voyagePercent(vp) + '%'"></div></div>
                                            <span class="text-dim" x-text="voyagePercent(vp) + '%'"></span>
                                        </td>
                                        <td>
                                            <span x-text="vp.completedMissions + '/' + vp.totalMissions + ' done'"></span>
                                            <span class="text-dim" x-show="vp.failedMissions > 0" x-text="', ' + vp.failedMissions + ' failed'"></span>
                                        </td>
                                        <td @click.stop>
                                            <div class="action-menu-wrap">
                                                <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'home-vyg-' + vp.voyage?.id)" title="Actions">&#8942;</button>
                                                <div class="action-menu-dropdown" x-show="openActionMenu === 'home-vyg-' + vp.voyage?.id" x-cloak>
                                                    <button class="action-menu-item" @click="showJson('Voyage: ' + (vp.voyage?.title || vp.voyage?.id), vp.voyage?.id, vp.voyage); closeActionMenu()">View JSON</button>
                                                    <button class="action-menu-item danger" x-show="vp.voyage?.status !== 'Open' && vp.voyage?.status !== 'InProgress'" @click="deleteVoyage(vp.voyage?.id); closeActionMenu()">Delete</button>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <div>
                <div class="view-header" style="margin-top:1.5rem">
                    <h3>Recent Missions</h3>
                    <div class="view-actions filter-bar">
                        <select class="filter-select" x-model="recentMissionFilters.status" title="Filter by mission status">
                            <option value="">All Statuses</option>
                            <option value="Pending">Pending</option>
                            <option value="Assigned">Assigned</option>
                            <option value="InProgress">InProgress</option>
                            <option value="Testing">Testing</option>
                            <option value="Review">Review</option>
                            <option value="Complete">Complete</option>
                            <option value="Failed">Failed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                        <select class="filter-select" x-model="recentMissionFilters.vesselId" title="Filter by target vessel">
                            <option value="">All Vessels</option>
                            <template x-for="v in allVessels" :key="v.id">
                                <option :value="v.id" x-text="v.name"></option>
                            </template>
                        </select>
                        <select class="filter-select" x-model="recentMissionFilters.captainId" title="Filter by assigned captain">
                            <option value="">All Captains</option>
                            <template x-for="c in captains" :key="c.id">
                                <option :value="c.id" x-text="c.name"></option>
                            </template>
                        </select>
                        <button class="btn btn-sm" @click="navigate('missions'); loadMissions()" title="Go to full missions list">View All &rarr;</button>
                    </div>
                </div>
                <template x-if="recentMissions.length > 0">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th title="Mission title">Mission</th>
                                    <th>ID</th>
                                    <th title="Current mission lifecycle state">Status</th>
                                    <th title="Target repository for this mission">Vessel</th>
                                    <th title="AI captain assigned to execute this mission">Captain</th>
                                    <th title="When this mission was created">Created</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in filteredRecentMissions()" :key="m.id">
                                    <tr class="clickable" @click="navigate('missions', 'mission-detail', m.id)">
                                        <td class="truncate-cell" :title="m.title"><strong x-text="m.title"></strong></td>
                                        <td class="mono text-dim"><span class="id-display"><span x-text="m.id"></span><button class="copy-btn" @click.stop="copyId(m.id, $event)" title="Copy ID"></button></span></td>
                                        <td><span class="tag" :class="(m.status || '').toLowerCase()" x-text="m.status" :title="statusTooltip(m.status)"></span></td>
                                        <td x-text="vesselName(m.vesselId)"></td>
                                        <td x-text="captainName(m.captainId)"></td>
                                        <td class="text-dim" x-text="formatTime(m.createdUtc)" :title="formatTimeAbsolute(m.createdUtc)"></td>
                                        <td @click.stop>
                                            <div class="action-menu-wrap">
                                                <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'home-msn-' + m.id)" title="Actions">&#8942;</button>
                                                <div class="action-menu-dropdown" x-show="openActionMenu === 'home-msn-' + m.id" x-cloak>
                                                    <button class="action-menu-item" @click="viewMissionDiff(m.id); closeActionMenu()">Diff</button>
                                                    <button class="action-menu-item" @click="viewMissionLog(m.id); closeActionMenu()">Log</button>
                                                    <button class="action-menu-item" @click="showJson('Mission: ' + m.title, m.id, m); closeActionMenu()">View JSON</button>
                                                    <button class="action-menu-item danger" @click="deleteMission(m.id); closeActionMenu()">Delete</button>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <p class="text-dim" x-show="filteredRecentMissions().length === 0">No missions found.</p>
            </div>

            <template x-if="status.recentSignals && status.recentSignals.length > 0">
                <div style="margin-top:1.5rem">
                    <h3>Recent Signals</h3>
                    <div class="signal-list">
                        <template x-for="sig in status.recentSignals" :key="sig.id">
                            <div class="signal-item">
                                <span class="tag" :class="(sig.type || '').toLowerCase()" x-text="sig.type" :title="statusTooltip(sig.type)"></span>
                                <span x-text="sig.payload || sig.message"></span>
                                <span class="text-dim" x-text="formatTime(sig.createdUtc)" :title="formatTimeAbsolute(sig.createdUtc)"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
