        <div x-show="!detailView">
            <div class="view-header">
                <div>
                    <h2>Doctor</h2>
                    <p class="text-dim view-subtitle">System health diagnostics and checks.</p>
                </div>
                <div class="view-actions">
                    <button class="btn btn-primary btn-sm" @click="runDoctorChecks()" :disabled="doctorRunning" title="Run all health checks">
                        <span x-show="doctorRunning">Running...</span>
                        <span x-show="!doctorRunning">Run Checks</span>
                    </button>
                </div>
            </div>
            <div x-show="doctorRunning" style="text-align:center;padding:2rem">
                <span class="text-dim">Running health checks...</span>
            </div>
            <div x-show="!doctorRunning && doctorResults.length > 0" class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Check</th>
                            <th>Status</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="check in doctorResults" :key="check.name">
                            <tr>
                                <td x-text="check.name" style="font-weight:500"></td>
                                <td>
                                    <span class="doctor-badge"
                                          :class="'doctor-' + check.status.toLowerCase()"
                                          x-text="check.status"
                                          :title="statusTooltip(check.status)"></span>
                                </td>
                                <td class="text-dim" x-text="check.message"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div x-show="!doctorRunning && doctorResults.length === 0" class="text-dim" style="padding:2rem;text-align:center">
                No results yet. Click "Run Checks" to start diagnostics.
            </div>
        </div>
