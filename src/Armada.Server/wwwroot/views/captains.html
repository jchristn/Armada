            <div x-show="!detailView">
            <div class="view-header">
                <div>
                    <h2>Captains</h2>
                    <p class="text-dim view-subtitle">AI worker agents executing missions. Monitor captain status, assignments, and activity logs.</p>
                </div>
                <div class="view-actions">
                    <input type="text" class="filter-input" x-model="listSearch" placeholder="Search..." title="Search captains by name or ID">
                    <button class="btn btn-primary btn-sm" @click="openAddCaptain()" title="Register a new AI captain agent">+ Captain</button>
                    <button class="btn btn-sm btn-danger" x-show="selectedCaptains.length > 0" @click="deleteSelectedCaptains()" title="Remove all selected captains">Delete Selected (<span x-text="selectedCaptains.length"></span>)</button>
                    <button class="btn btn-sm btn-danger" @click="stopAllCaptains()"
                        x-show="captains.some(c => c.state === 'Working' || c.state === 'Stalled')" title="Stop all active captain processes">Stop All</button>
                </div>
            </div>
            <template x-if="captains.length === 0">
                <p class="text-dim">No captains registered.</p>
            </template>
            <!-- Captains Pagination -->
            <div class="pagination-bar" x-show="captainPaging.totalPages > 0">
                <div class="pagination-info">
                    <span class="pagination-records" x-text="captainPaging.totalRecords + ' records'"></span>
                    <span class="pagination-timing" x-text="captainPaging.totalMs.toFixed(1) + 'ms'"></span>
                    <select class="page-size-select" title="Number of records per page" :value="captainPaging.pageSize" @change="changePageSize(captainPaging, $event.target.value, loadCaptains)">
                        <option value="10">10 / page</option>
                        <option value="25">25 / page</option>
                        <option value="50">50 / page</option>
                        <option value="100">100 / page</option>
                        <option value="250">250 / page</option>
                        <option value="500">500 / page</option>
                        <option value="1000">1000 / page</option>
                    </select>
                </div>
                <div class="pagination-controls">
                    <button class="btn btn-sm" @click="prevPage(captainPaging, loadCaptains)" :disabled="captainPaging.pageNumber <= 1">&larr; Prev</button>
                    <span class="pagination-page">
                        Page <input type="number" class="page-input" :value="captainPaging.pageNumber" min="1" :max="captainPaging.totalPages"
                            @change="goToPage(captainPaging, parseInt($event.target.value), loadCaptains)">
                        of <span x-text="captainPaging.totalPages"></span>
                    </span>
                    <button class="btn btn-sm" @click="nextPage(captainPaging, loadCaptains)" :disabled="captainPaging.pageNumber >= captainPaging.totalPages">Next &rarr;</button>
                    <button class="btn btn-sm" @click="loadCaptains()" title="Refresh">&#x21bb;</button>
                </div>
            </div>
            <div class="table-wrap" x-show="captains.length > 0">
                <table>
                    <thead>
                        <tr>
                            <th class="col-checkbox"><input type="checkbox" @change="$event.target.checked ? selectAllCaptains() : clearCaptainSelection()" :checked="selectedCaptains.length > 0 && selectedCaptains.length === captains.length" title="Select all captains"></th>
                            <th class="sortable" @click="sortBy('name', captains)" title="Captain name -- click to sort">Name<span x-text="sortIcon('name')"></span></th>
                            <th title="Unique captain identifier">ID</th>
                            <th class="sortable" @click="sortBy('state', captains)" title="Idle, Working, or Stalled -- click to sort">State<span x-text="sortIcon('state')"></span></th>
                            <th title="AI agent runtime type (e.g. Claude Code, Codex)">Runtime</th>
                            <th title="Currently assigned mission, if any">Mission</th>
                            <th title="Operating system process ID of the captain agent">PID</th>
                            <th title="Last time this captain reported activity">Heartbeat</th>
                            <th>Actions</th>
                        </tr>
                        <tr class="column-filter-row">
                            <td></td>
                            <td><input type="text" class="col-filter" x-model="captainColFilters.name" placeholder="Filter..."></td>
                            <td></td>
                            <td><input type="text" class="col-filter" x-model="captainColFilters.state" placeholder="Filter..."></td>
                            <td><input type="text" class="col-filter" x-model="captainColFilters.runtime" placeholder="Filter..."></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="cpt in sortedRows(columnFilteredCaptains())" :key="cpt.id">
                            <tr>
                                <td class="col-checkbox"><input type="checkbox" :checked="selectedCaptains.includes(cpt.id)" @change="toggleCaptainSelection(cpt.id)" title="Select this captain"></td>
                                <td class="clickable" @click.stop="openEditCaptain(cpt)"><strong x-text="cpt.name"></strong></td>
                                <td class="mono text-dim"><span class="id-display"><span x-text="cpt.id"></span><button class="copy-btn" @click.stop="copyId(cpt.id, $event)" title="Copy ID"></button></span></td>
                                <td><span class="tag" :class="(cpt.state || '').toLowerCase()" x-text="cpt.state" :title="statusTooltip(cpt.state)"></span></td>
                                <td x-text="cpt.runtime || 'ClaudeCode'"></td>
                                <td>
                                    <span x-show="cpt.currentMissionId" class="id-display"><a class="mono" href="#" @click.prevent="navigate('missions', 'mission-detail', cpt.currentMissionId)" x-text="cpt.currentMissionId"></a><button class="copy-btn" @click.stop="copyId(cpt.currentMissionId, $event)" title="Copy ID"></button></span>
                                    <span x-show="!cpt.currentMissionId">-</span>
                                </td>
                                <td x-text="cpt.processId || '-'"></td>
                                <td class="text-dim" x-text="formatTime(cpt.lastHeartbeatUtc)" :title="formatTimeAbsolute(cpt.lastHeartbeatUtc)"></td>
                                <td>
                                    <div class="action-menu-wrap">
                                        <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'cpt-' + cpt.id)" title="Actions">&#8942;</button>
                                        <div class="action-menu-dropdown" x-show="openActionMenu === 'cpt-' + cpt.id" x-cloak>
                                            <button class="action-menu-item" @click="openEditCaptain(cpt); closeActionMenu()">Edit</button>
                                            <button class="action-menu-item" @click="showJson('Captain: ' + cpt.name, cpt.id, cpt); closeActionMenu()">View JSON</button>
                                            <button class="action-menu-item danger" x-show="cpt.state === 'Working' || cpt.state === 'Stalled'" @click="recallCaptain(cpt.id); closeActionMenu()">Recall</button>
                                            <button class="action-menu-item danger" x-show="cpt.state === 'Idle'" @click="removeCaptain(cpt.id); closeActionMenu()">Remove</button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            </div>

            <!-- Captain Detail -->
            <div x-show="detailView === 'captain-detail'">
            <button class="btn btn-sm" @click="goBack()" title="Return to captains list">&larr; Back</button>
            <template x-if="detail">
                <div>
                    <div class="detail-header">
                        <h2 x-text="detail.name"></h2>
                        <div class="inline-actions">
                            <div class="action-menu-wrap">
                                <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'cpt-detail-' + detail.id)" title="Actions">&#8942;</button>
                                <div class="action-menu-dropdown" x-show="openActionMenu === 'cpt-detail-' + detail.id" x-cloak>
                                    <button class="action-menu-item" @click="openEditCaptain(detail); closeActionMenu()">Edit</button>
                                    <button class="action-menu-item" @click="showJson('Captain: ' + detail.name, detail.id, detail); closeActionMenu()">View JSON</button>
                                    <button class="action-menu-item danger" x-show="detail.state === 'Working' || detail.state === 'Stalled'" @click="recallCaptain(detail.id); closeActionMenu()">Stop</button>
                                    <button class="action-menu-item danger" x-show="detail.state === 'Idle'" @click="removeCaptain(detail.id); closeActionMenu()">Remove</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-field"><span class="detail-label">ID</span><span class="id-display"><span class="mono" x-text="detail.id"></span><button class="copy-btn" @click.stop="copyId(detail.id, $event)" title="Copy ID"></button></span></div>
                        <div class="detail-field"><span class="detail-label">State</span><span class="tag" :class="(detail.state || '').toLowerCase()" x-text="detail.state" :title="statusTooltip(detail.state)"></span></div>
                        <div class="detail-field"><span class="detail-label">Runtime</span><span x-text="detail.runtime || 'ClaudeCode'"></span></div>
                        <div class="detail-field"><span class="detail-label">Process ID</span><span x-text="detail.processId || '-'"></span></div>
                        <div class="detail-field"><span class="detail-label">Current Mission</span>
                            <span x-show="detail.currentMissionId" class="id-display"><a class="mono" href="#" @click.prevent="navigate('missions', 'mission-detail', detail.currentMissionId)" x-text="detail.currentMissionId"></a><button class="copy-btn" @click.stop="copyId(detail.currentMissionId, $event)" title="Copy ID"></button></span>
                            <span x-show="!detail.currentMissionId">-</span>
                        </div>
                        <div class="detail-field"><span class="detail-label">Last Heartbeat</span><span x-text="formatTimeAbsolute(detail.lastHeartbeatUtc) || '-'"></span></div>
                        <div class="detail-field"><span class="detail-label">Created</span><span x-text="formatTimeAbsolute(detail.createdUtc)"></span></div>
                    </div>
                    <!-- Captain Log -->
                    <div style="margin-top:1rem">
                        <button class="btn btn-sm" @click="viewCaptainLog(detail.id)" title="View the captain's current execution log">View Current Log</button>
                        <template x-if="detailLog && !detailLog.error">
                            <div>
                                <h3>Current Log <span class="text-dim" x-text="'(' + (detailLog.lines || 0) + ' of ' + (detailLog.totalLines || 0) + ' lines)'"></span></h3>
                                <pre class="diff-viewer" x-text="detailLog.log || 'No log output'"></pre>
                            </div>
                        </template>
                        <template x-if="detailLog && detailLog.error">
                            <p class="text-dim" x-text="'Log unavailable: ' + detailLog.error"></p>
                        </template>
                    </div>
                    <div style="margin-top:1rem">
                        <h3>Recent Missions</h3>
                        <template x-if="detailMissions.length > 0">
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th title="Mission name and unique identifier">Mission</th><th title="Current mission lifecycle state">Status</th><th title="Git branch for this mission's work">Branch</th><th title="When the mission was completed or created">Date</th></tr></thead>
                                    <tbody>
                                        <template x-for="m in detailMissions" :key="m.id">
                                            <tr class="clickable" @click="navigate('missions', 'mission-detail', m.id)">
                                                <td><strong x-text="m.title"></strong><div class="text-dim id-display"><span class="mono" x-text="m.id"></span><button class="copy-btn" @click.stop="copyId(m.id, $event)" title="Copy ID"></button></div></td>
                                                <td><span class="tag" :class="(m.status || '').toLowerCase()" x-text="m.status" :title="statusTooltip(m.status)"></span></td>
                                                <td class="text-dim" x-text="m.branchName || '-'"></td>
                                                <td class="text-dim" :title="formatTimeAbsolute(m.completedUtc || m.createdUtc)" x-text="formatTime(m.completedUtc || m.createdUtc)"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <p x-show="detailMissions.length === 0" class="text-dim" style="margin-top:0.5rem">No missions yet</p>
                    </div>
                </div>
            </template>
            </div>
