            <div x-show="!detailView">
            <div class="view-header">
                <div>
                    <h2>Vessels</h2>
                    <p class="text-dim view-subtitle">Git repositories organized by fleet. Filter by fleet, manage vessels, and view project details.</p>
                </div>
                <div class="view-actions">
                    <select class="filter-select" x-model="vesselFilters.fleetId" title="Filter vessels by fleet">
                        <option value="">All Fleets</option>
                        <template x-for="f in fleets" :key="f.id">
                            <option :value="f.id" x-text="f.name"></option>
                        </template>
                    </select>
                    <input type="text" class="filter-input" x-model="listSearch" placeholder="Search..." title="Search vessels by name, ID, repo URL, or branch">
                    <button class="btn btn-sm btn-danger" x-show="selectedVessels.length > 0" @click="deleteSelectedVessels()" title="Delete all selected vessels">Delete Selected (<span x-text="selectedVessels.length"></span>)</button>
                    <button class="btn btn-primary btn-sm" @click="openCreateFleet()" title="Create a new fleet to group repositories">+ Fleet</button>
                    <button class="btn btn-primary btn-sm" @click="openCreateVessel()" title="Add a new vessel (repository) to a fleet">+ Vessel</button>
                    <button class="btn btn-sm" @click="loadFleets(); loadVessels()" title="Refresh vessel data">&#x21bb;</button>
                </div>
            </div>
            <template x-if="allVessels.length === 0">
                <p class="text-dim">No vessels configured.</p>
            </template>
            <div class="table-wrap" x-show="allVessels.length > 0">
                <table>
                    <thead>
                        <tr>
                            <th class="col-checkbox"><input type="checkbox" @change="$event.target.checked ? selectAllVessels() : clearVesselSelection()" :checked="selectedVessels.length > 0 && selectedVessels.length === filteredVesselsList().length" title="Select all vessels"></th>
                            <th class="sortable" @click="sortBy('name', allVessels)" title="Vessel name -- click to sort">Vessel<span x-text="sortIcon('name')"></span></th>
                            <th>ID</th>
                            <th class="sortable" @click="sortBy('_fleetName', allVessels)" title="Fleet -- click to sort">Fleet<span x-text="sortIcon('_fleetName')"></span></th>
                            <th class="sortable" @click="sortBy('repoUrl', allVessels)" title="Git repository URL -- click to sort">Repo URL<span x-text="sortIcon('repoUrl')"></span></th>
                            <th class="sortable" @click="sortBy('defaultBranch', allVessels)" title="Default branch -- click to sort">Branch<span x-text="sortIcon('defaultBranch')"></span></th>
                            <th style="width: 4.5rem; white-space: nowrap;" title="Context and style guide indicators"></th>
                            <th class="text-right">Actions</th>
                        </tr>
                        <tr class="column-filter-row">
                            <td></td>
                            <td><input type="text" class="col-filter" x-model="vesselColFilters.name" placeholder="Filter..."></td>
                            <td></td>
                            <td><input type="text" class="col-filter" x-model="vesselColFilters.fleet" placeholder="Filter..."></td>
                            <td><input type="text" class="col-filter" x-model="vesselColFilters.repoUrl" placeholder="Filter..."></td>
                            <td><input type="text" class="col-filter" x-model="vesselColFilters.branch" placeholder="Filter..."></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="v in paginateLocal(sortedRows(columnFilteredVessels()), vesselPaging)" :key="v.id">
                            <tr>
                                <td class="col-checkbox"><input type="checkbox" :checked="selectedVessels.includes(v.id)" @change="toggleVesselSelection(v.id)" title="Select this vessel"></td>
                                <td class="clickable" @click.stop="openEditVessel(v)"><strong x-text="v.name"></strong></td>
                                <td class="mono text-dim"><span class="id-display"><span x-text="v.id"></span><button class="copy-btn" @click.stop="copyId(v.id, $event)" title="Copy ID"></button></span></td>
                                <td><a href="#" @click.prevent="navigate('fleets', 'fleet-detail', v.fleetId)" x-text="fleetName(v.fleetId)" x-show="v.fleetId"></a><span x-show="!v.fleetId">-</span></td>
                                <td class="text-dim vessel-repo-cell" x-text="v.repoUrl"></td>
                                <td class="text-dim" style="white-space:nowrap" x-text="v.defaultBranch || 'main'"></td>
                                <td style="white-space:nowrap"><span class="vessel-badge" x-show="v.projectContext" title="Has Project Context">CTX</span><span class="vessel-badge" x-show="v.styleGuide" title="Has Style Guide">STY</span></td>
                                <td class="text-right">
                                    <div class="action-menu-wrap">
                                        <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'vsl-' + v.id)" title="Actions">&#8942;</button>
                                        <div class="action-menu-dropdown" x-show="openActionMenu === 'vsl-' + v.id" x-cloak>
                                            <button class="action-menu-item" @click="openEditVessel(v); closeActionMenu()">Edit</button>
                                            <button class="action-menu-item" @click="showJson('Vessel: ' + v.name, v.id, v); closeActionMenu()">View JSON</button>
                                            <button class="action-menu-item danger" @click="deleteVessel(v.id); closeActionMenu()">Delete</button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div class="pagination-bar" x-show="vesselPaging.totalPages > 0">
                <div class="pagination-info">
                    <span class="pagination-records" x-text="vesselPaging.totalRecords + ' records'"></span>
                    <select class="page-size-select" title="Number of records per page" :value="vesselPaging.pageSize" @change="changePageSize(vesselPaging, $event.target.value, noopLoad)">
                        <option value="10">10 / page</option>
                        <option value="25">25 / page</option>
                        <option value="50">50 / page</option>
                        <option value="100">100 / page</option>
                        <option value="250">250 / page</option>
                        <option value="500">500 / page</option>
                        <option value="1000">1000 / page</option>
                    </select>
                </div>
                <div class="pagination-controls">
                    <button class="btn btn-sm" @click="prevPage(vesselPaging, noopLoad)" :disabled="vesselPaging.pageNumber <= 1">&larr; Prev</button>
                    <span class="pagination-page">
                        Page <input type="number" class="page-input" :value="vesselPaging.pageNumber" min="1" :max="vesselPaging.totalPages"
                            @change="goToPage(vesselPaging, parseInt($event.target.value), noopLoad)">
                        of <span x-text="vesselPaging.totalPages"></span>
                    </span>
                    <button class="btn btn-sm" @click="nextPage(vesselPaging, noopLoad)" :disabled="vesselPaging.pageNumber >= vesselPaging.totalPages">Next &rarr;</button>
                </div>
            </div>
            </div>

            <!-- Fleet Detail (from vessels view) -->
            <div x-show="detailView === 'fleet-detail'">
            <button class="btn btn-sm" @click="goBack()" title="Return to fleets list">&larr; Back</button>
            <template x-if="detail">
                <div>
                    <div class="detail-header">
                        <h2 x-text="detail.name"></h2>
                        <div class="inline-actions">
                            <div class="action-menu-wrap">
                                <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'flt-detail-' + detail.id)" title="Actions">&#8942;</button>
                                <div class="action-menu-dropdown" x-show="openActionMenu === 'flt-detail-' + detail.id" x-cloak>
                                    <button class="action-menu-item" @click="openEditFleet(detail); closeActionMenu()">Edit</button>
                                    <button class="action-menu-item" @click="showJson('Fleet: ' + detail.name, detail.id, detail); closeActionMenu()">View JSON</button>
                                    <button class="action-menu-item danger" @click="deleteFleet(detail.id); closeActionMenu()">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-field"><span class="detail-label">ID</span><span class="id-display"><span class="mono" x-text="detail.id"></span><button class="copy-btn" @click.stop="copyId(detail.id, $event)" title="Copy ID"></button></span></div>
                        <div class="detail-field"><span class="detail-label">Description</span><span x-text="detail.description || '-'"></span></div>
                        <div class="detail-field"><span class="detail-label">Active</span><span x-text="detail.active !== false ? 'Yes' : 'No'"></span></div>
                        <div class="detail-field"><span class="detail-label">Created</span><span x-text="formatTimeAbsolute(detail.createdUtc)" :title="detail.createdUtc"></span></div>
                    </div>
                    <template x-if="detail.vessels && detail.vessels.length > 0">
                        <div>
                            <h3>Vessels</h3>
                            <div class="table-wrap">
                                <table class="vessel-table vessel-table-detail">
                                    <colgroup>
                                        <col class="vessel-col-name">
                                        <col class="vessel-col-repo">
                                        <col class="vessel-col-branch">
                                    </colgroup>
                                    <thead><tr><th title="Vessel name and unique identifier">Name</th><th title="Git repository URL">Repo URL</th><th title="Default branch for merging">Branch</th></tr></thead>
                                    <tbody>
                                        <template x-for="v in detail.vessels" :key="v.id">
                                            <tr class="clickable" @click="navigate('fleets', 'vessel-detail', v.id)">
                                                <td><strong x-text="v.name"></strong><div class="text-dim id-display"><span class="mono" x-text="v.id"></span><button class="copy-btn" @click.stop="copyId(v.id, $event)" title="Copy ID"></button></div></td>
                                                <td class="text-dim vessel-repo-cell" x-text="v.repoUrl"></td>
                                                <td x-text="v.defaultBranch || 'main'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            </div>

            <!-- Vessel Detail -->
            <div x-show="detailView === 'vessel-detail'">
            <button class="btn btn-sm" @click="goBack()" title="Return to previous view">&larr; Back</button>
            <template x-if="detail">
                <div>
                    <div class="detail-header">
                        <h2 x-text="detail.name"></h2>
                        <div class="inline-actions">
                            <div class="action-menu-wrap">
                                <button class="action-menu-btn" @click.stop="toggleActionMenu($event,'vsl-detail-' + detail.id)" title="Actions">&#8942;</button>
                                <div class="action-menu-dropdown" x-show="openActionMenu === 'vsl-detail-' + detail.id" x-cloak>
                                    <button class="action-menu-item" @click="openEditVessel(detail); closeActionMenu()">Edit</button>
                                    <button class="action-menu-item" @click="showJson('Vessel: ' + detail.name, detail.id, detail); closeActionMenu()">View JSON</button>
                                    <button class="action-menu-item danger" @click="deleteVessel(detail.id); closeActionMenu()">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-field"><span class="detail-label">ID</span><span class="id-display"><span class="mono" x-text="detail.id"></span><button class="copy-btn" @click.stop="copyId(detail.id, $event)" title="Copy ID"></button></span></div>
                        <div class="detail-field"><span class="detail-label">Fleet</span><a href="#" @click.prevent="navigate('fleets', 'fleet-detail', detail.fleetId)" x-text="fleetName(detail.fleetId)"></a></div>
                        <div class="detail-field"><span class="detail-label">Repo URL</span><span class="mono" x-text="detail.repoUrl || '-'"></span></div>
                        <div class="detail-field"><span class="detail-label">Default Branch</span><span x-text="detail.defaultBranch || 'main'"></span></div>
                        <div class="detail-field"><span class="detail-label">Local Path</span><span class="mono" x-text="detail.localPath || '-'" title="Path to the bare git repository clone used by Armada"></span></div>
                        <div class="detail-field"><span class="detail-label">Working Directory</span><span class="mono" x-text="detail.workingDirectory || '-'" title="Your local checkout where completed missions are merged"></span></div>
                        <div class="detail-field"><span class="detail-label">Active</span><span x-text="detail.active !== false ? 'Yes' : 'No'"></span></div>
                        <div class="detail-field"><span class="detail-label">Created</span><span x-text="formatTimeAbsolute(detail.createdUtc)"></span></div>
                    </div>
                    <div class="detail-context-section" x-show="detail.projectContext">
                        <h4>Project Context</h4>
                        <pre class="detail-context-block" x-text="detail.projectContext"></pre>
                    </div>
                    <div class="detail-context-section" x-show="detail.styleGuide">
                        <h4>Style Guide</h4>
                        <pre class="detail-context-block" x-text="detail.styleGuide"></pre>
                    </div>
                    <template x-if="detailMissions.length > 0">
                        <div>
                            <h3>Missions</h3>
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th title="Mission name and unique identifier">Mission</th><th title="Current mission lifecycle state">Status</th><th title="AI captain assigned to this mission">Captain</th><th title="Git branch for this mission's work">Branch</th></tr></thead>
                                    <tbody>
                                        <template x-for="m in detailMissions" :key="m.id">
                                            <tr class="clickable" @click="navigate(view, 'mission-detail', m.id)">
                                                <td><strong x-text="m.title"></strong><div class="text-dim id-display"><span class="mono" x-text="m.id"></span><button class="copy-btn" @click.stop="copyId(m.id, $event)" title="Copy ID"></button></div></td>
                                                <td><span class="tag" :class="(m.status || '').toLowerCase()" x-text="m.status" :title="statusTooltip(m.status)"></span></td>
                                                <td x-text="captainName(m.captainId)"></td>
                                                <td class="text-dim" x-text="m.branchName || '-'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            </div>
